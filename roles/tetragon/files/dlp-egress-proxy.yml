---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dlp-egress-proxy-squid
data:
  squid.conf: |
    http_port 3128
    request_body_max_size 5 MB
    acl SSL_ports port 443
    acl Safe_ports port 80
    acl Safe_ports port 443
    acl CONNECT method CONNECT
    http_access deny !Safe_ports
    http_access deny CONNECT !SSL_ports
    # Allow workspace egress through this proxy (policy enforcement stays at Cilium/Tetragon).
    http_access allow all
    access_log stdio:/var/log/squid/access.log
    cache deny all
    coredump_dir /var/spool/squid
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlp-egress-proxy
  labels:
    app.kubernetes.io/name: dlp-egress-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dlp-egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dlp-egress-proxy
    spec:
      containers:
        - name: squid
          image: ubuntu/squid:latest
          ports:
            - containerPort: 3128
              name: proxy
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: squid-conf
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
      volumes:
        - name: squid-conf
          configMap:
            name: dlp-egress-proxy-squid
---
apiVersion: v1
kind: Service
metadata:
  name: dlp-egress-proxy
  labels:
    app.kubernetes.io/name: dlp-egress-proxy
spec:
  selector:
    app.kubernetes.io/name: dlp-egress-proxy
  ports:
    - name: proxy
      port: 3128
      targetPort: proxy

---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: enforce-sensitive-read
spec:
  kprobes:
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/shadow"
                - "/etc/gshadow"
                - "/var/run/secrets/kubernetes.io"
                - "/var/lib/rancher"
                - "/etc/rancher"
                - "/root/.kube"
          matchActions:
            - action: Sigkill

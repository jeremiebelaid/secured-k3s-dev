[tools]
python = "3.14"
"pipx:ansible-core" = { version = "latest", uvx_args = "--with ansible" }
helm = "3"
kubectl = "1.31"
k9s = "latest"
coder = "latest"
uv = "latest"
terraform = "1"

[env]
_.file = [".generated.env", ".env"]

[tasks.init]
description = "Install Ansible Galaxy collections"
run = """
uv run python scripts/generate-env-secrets.py --env-file .generated.env --key CODER_SECRET_KEY
ansible-galaxy collection install -r requirements.yml
"""

[tasks.env-generate]
description = "Generate required .env vars if missing"
run = "uv run python scripts/generate-env-secrets.py --env-file .generated.env --key CODER_SECRET_KEY"

[tasks.deploy]
description = "Deploy full stack (k3s + cilium + tetragon + coder)"
depends = ["init"]
run = "ansible-playbook playbooks/site.yml"

[tasks.reset]
description = "Tear down the entire stack"
run = "ansible-playbook playbooks/reset.yml"

[tasks.status]
description = "Show cluster status"
run = """
echo "=== Nodes ==="
kubectl get nodes -o wide
echo ""
echo "=== Cilium ==="
kubectl -n kube-system get pods -l app.kubernetes.io/part-of=cilium
echo ""
echo "=== Tetragon ==="
kubectl -n kube-system get pods -l app.kubernetes.io/name=tetragon
echo ""
echo "=== Coder ==="
kubectl -n coder get pods -o wide
"""

[tasks.tetragon-logs]
description = "Stream Tetragon security events from coder namespace"
run = "kubectl logs -n kube-system -l app.kubernetes.io/name=tetragon -c export-stdout -f"

[tasks.image-build]
description = "Build the Podman workspace image and import into k3s"
run = """
docker build --progress plain -t coder-podman:latest templates/podman-workspace/build/
docker save coder-podman:latest | sudo k3s ctr images import -
echo "Image imported into k3s containerd"
sudo k3s crictl images | grep coder-podman
"""

[tasks.secure-template-push]
description = "Push the secure Podman workspace template to Coder"
depends = ["image-build"]
run = "coder templates push podman-workspace-secure --directory templates/podman-workspace-secure --yes"

[tasks.deploy-tetragon]
description = "Deploy only the Tetragon role (policies + enforcement)"
depends = ["init"]
run = "ansible-playbook playbooks/site.yml --tags tetragon --ask-become-pass"

[tasks.secure-status]
description = "Show enforcement policies and events in coder-secure namespace"
run = """
echo "=== TracingPolicies (coder-secure) ==="
kubectl -n coder-secure get tracingpoliciesnamespaced 2>/dev/null || echo "No TracingPoliciesNamespaced found"
echo ""
echo "=== CiliumNetworkPolicies (coder-secure) ==="
kubectl -n coder-secure get ciliumnetworkpolicies 2>/dev/null || echo "No CiliumNetworkPolicies found"
echo ""
echo "=== Pods (coder-secure) ==="
kubectl -n coder-secure get pods -o wide 2>/dev/null || echo "No pods found"
"""

[tasks.egress-alert]
description = "Alert if workspace egress exceeds 200MB/hour via proxy logs"
run = "uv run python scripts/alert-egress-volume.py --namespace coder-secure --window 1h --threshold-mb 200"

[tasks.dataleakage-test]
description = "Run data leak prevention test suite against a Coder workspace"
usage = 'arg "workspace" help="Coder workspace name" default="dlp-simple"'
run = "bash scripts/demo-dataleakage.sh {{arg(name=\"workspace\")}}"

[tasks.deploy-tailscale]
description = "Deploy only the Tailscale VPN role"
depends = ["init"]
run = "ansible-playbook playbooks/site.yml --tags tailscale --ask-become-pass"

[tasks.deploy-monitoring]
description = "Deploy Prometheus + Grafana monitoring stack"
depends = ["init"]
run = "ansible-playbook playbooks/site.yml --tags monitoring"

[tasks.vmss-init]
description = "Initialize Terraform for Azure VMSS scraper nodes"
run = "terraform -chdir=terraform/azure-vmss init"

[tasks.vmss-plan]
description = "Plan Azure VMSS changes"
run = """
export TF_VAR_k3s_master_tailscale_ip="$(tailscale ip -4)"
export TF_VAR_k3s_token="$(sudo cat /var/lib/rancher/k3s/server/node-token)"
export TF_VAR_tailscale_api_key="${TAILSCALE_API_KEY:?Set TAILSCALE_API_KEY in .env}"
export TF_VAR_tailscale_tailnet="${TAILSCALE_TAILNET:?Set TAILSCALE_TAILNET in .env}"
export TF_VAR_azure_tenant_id="$(az account show --query tenantId -o tsv)"
terraform -chdir=terraform/azure-vmss plan
"""

[tasks.vmss-apply]
description = "Apply Azure VMSS (create/update scraper nodes)"
run = """
export TF_VAR_k3s_master_tailscale_ip="$(tailscale ip -4)"
export TF_VAR_k3s_token="$(sudo cat /var/lib/rancher/k3s/server/node-token)"
export TF_VAR_tailscale_api_key="${TAILSCALE_API_KEY:?Set TAILSCALE_API_KEY in .env}"
export TF_VAR_tailscale_tailnet="${TAILSCALE_TAILNET:?Set TAILSCALE_TAILNET in .env}"
export TF_VAR_azure_tenant_id="$(az account show --query tenantId -o tsv)"
terraform -chdir=terraform/azure-vmss apply
"""

[tasks.vmss-destroy]
description = "Destroy Azure VMSS scraper nodes"
run = """
export TF_VAR_k3s_master_tailscale_ip="$(tailscale ip -4)"
export TF_VAR_k3s_token="$(sudo cat /var/lib/rancher/k3s/server/node-token)"
export TF_VAR_tailscale_api_key="${TAILSCALE_API_KEY:?Set TAILSCALE_API_KEY in .env}"
export TF_VAR_tailscale_tailnet="${TAILSCALE_TAILNET:?Set TAILSCALE_TAILNET in .env}"
export TF_VAR_azure_tenant_id="$(az account show --query tenantId -o tsv)"
terraform -chdir=terraform/azure-vmss destroy
"""

[tasks.vmss-cleanup]
description = "Remove orphaned k3s nodes (NotReady) and offline Tailscale devices for scraper nodes"
run = """
export TAILSCALE_API_KEY="${TAILSCALE_API_KEY:?Set TAILSCALE_API_KEY in .env}"

echo "=== Cleaning orphaned k3s scraper nodes ==="
for node in $(kubectl get nodes -l node-role=scraper --no-headers 2>/dev/null | awk '$2=="NotReady"{print $1}'); do
  echo "  Deleting NotReady node: $node"
  kubectl delete node "$node" --force --grace-period=0 2>/dev/null || true
done
echo "  Done (k3s)"

echo ""
echo "=== Cleaning offline Tailscale devices ==="
tailscale status --json 2>/dev/null | python3 -c "
import json, sys, urllib.request, os
data = json.load(sys.stdin)
api_key = os.environ['TAILSCALE_API_KEY']
cleaned = 0
for pid, p in data.get('Peer', {}).items():
    name = p.get('HostName', '')
    online = p.get('Online', False)
    nid = p.get('ID', '')
    if name.startswith('mf-scraper-') and not online and nid:
        print(f'  Removing offline device: {name}')
        req = urllib.request.Request(f'https://api.tailscale.com/api/v2/device/{nid}', method='DELETE')
        req.add_header('Authorization', f'Bearer {api_key}')
        try:
            urllib.request.urlopen(req)
            cleaned += 1
        except Exception as e:
            print(f'    Warning: {e}')
print(f'  Done ({cleaned} devices removed)')
" || true
"""

[tasks.vmss-scale]
description = "Scale VMSS to N instances (cleans orphans first)"
usage = 'arg "count" help="Target instance count"'
depends = ["vmss-cleanup"]
run = """
export TF_VAR_k3s_master_tailscale_ip="$(tailscale ip -4)"
export TF_VAR_k3s_token="$(sudo cat /var/lib/rancher/k3s/server/node-token)"
export TF_VAR_tailscale_api_key="${TAILSCALE_API_KEY:?Set TAILSCALE_API_KEY in .env}"
export TF_VAR_tailscale_tailnet="${TAILSCALE_TAILNET:?Set TAILSCALE_TAILNET in .env}"
export TF_VAR_azure_tenant_id="$(az account show --query tenantId -o tsv)"
terraform -chdir=terraform/azure-vmss apply -var="instance_count={{arg(name="count")}}" -auto-approve
"""

[tasks.vmss-status]
description = "Show VMSS nodes in the k3s cluster"
run = """
echo "=== k3s scraper nodes ==="
kubectl get nodes -o wide -l node-role=scraper
echo ""
echo "=== Tailscale peers (mf-scraper-*) ==="
tailscale status | grep -E '(mf-scraper-|^$)' || echo "  No scraper peers found"
"""

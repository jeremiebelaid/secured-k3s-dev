---
- name: System prerequisites
  hosts: localhost
  become: true
  gather_facts: true
  tags: [prereq]
  roles:
    - prereq

- name: Install and configure Tailscale VPN
  hosts: localhost
  become: true
  gather_facts: false
  tags: [tailscale]
  roles:
    - tailscale

- name: Resolve Tailscale IP (needed by k3s and cilium)
  hosts: localhost
  become: false
  gather_facts: false
  tags: [always]
  tasks:
    - name: Check if Tailscale is available
      ansible.builtin.command: tailscale ip -4
      register: _ts_ip_lookup
      changed_when: false
      failed_when: false

    - name: Set tailscale_ip fact for downstream roles
      ansible.builtin.set_fact:
        tailscale_ip: "{{ _ts_ip_lookup.stdout | trim }}"
      when: _ts_ip_lookup.rc == 0 and _ts_ip_lookup.stdout | trim | length > 0

- name: Install K3s
  hosts: localhost
  become: true
  gather_facts: false
  tags: [k3s]
  roles:
    - k3s

- name: Install Cilium CNI
  hosts: localhost
  become: false
  gather_facts: false
  tags: [cilium]
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  roles:
    - cilium

- name: Install Tetragon runtime security
  hosts: localhost
  become: false
  gather_facts: false
  tags: [tetragon]
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  roles:
    - tetragon

- name: Install OpenEBS storage
  hosts: localhost
  become: false
  gather_facts: false
  tags: [openebs]
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  roles:
    - openebs

- name: Install Azure Disk CSI driver
  hosts: localhost
  become: false
  gather_facts: false
  tags: [azure-disk-csi]
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  roles:
    - azure-disk-csi

- name: Install Prometheus + Grafana monitoring
  hosts: localhost
  become: false
  gather_facts: false
  tags: [monitoring]
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  roles:
    - monitoring

- name: Install Coder dev workspaces
  hosts: localhost
  become: false
  gather_facts: false
  tags: [coder]
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  roles:
    - coder
